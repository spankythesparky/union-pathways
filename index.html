<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="shortcut icon" href="/favicon-32x32.png" />
    <title>{{TITLE}}</title>
    <meta name="description" content="{{DESC}}"/>
    <meta property="og:title" content="{{TITLE}}"/>
    <meta property="og:description" content="{{DESC}}"/>
    <meta property="og:url" content="{{URL}}"/>
    <meta property="og:type" content="website"/>
    <meta property="og:site_name" content="Union Pathways"/>
    <meta property="og:image" content="https://unionpathways.com/social-preview.png"/>
    <meta property="og:image:width" content="1200"/>
    <meta property="og:image:height" content="630"/>
    <meta property="og:image:type" content="image/png"/>
    <meta name="twitter:card" content="summary_large_image"/>
    <meta name="twitter:title" content="{{TITLE}}"/>
    <meta name="twitter:description" content="{{DESC}}"/>
    <meta name="twitter:image" content="https://unionpathways.com/social-preview.png"/>
    <link rel="canonical" href="{{CANONICAL}}"/>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-6YG0F2LQKT"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag("js", new Date());
      gtag("config", "G-6YG0F2LQKT");
    </script>
    <style>
      #ig-banner {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        background: linear-gradient(90deg, #FA8059 0%, #F5A878 100%);
        color: #000;
        font-family: Arial, sans-serif;
        padding: 10px 14px;
        z-index: 99999;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        box-shadow: 0 2px 12px rgba(0,0,0,0.3);
        font-size: 13px;
        font-weight: 600;
      }
      body.is-instagram #ig-banner { display: flex; }
      body.is-instagram { padding-top: 44px; }
      #ig-banner-text { flex: 1; line-height: 1.3; }
      #ig-banner-actions { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
      #ig-open-btn {
        display: inline-block;
        background: #000;
        color: #FA8059;
        font-weight: 800;
        font-size: 12px;
        padding: 7px 14px;
        border-radius: 50px;
        text-decoration: none;
        white-space: nowrap;
      }
      #ig-close-btn {
        background: transparent;
        border: 1px solid rgba(0,0,0,0.4);
        color: #000;
        width: 24px;
        height: 24px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        font-size: 14px;
        font-weight: 900;
        line-height: 1;
        padding: 0;
      }
    </style>
    <script>
      (function() {
        var ua = navigator.userAgent || '';
        if (ua.indexOf('Instagram') > -1 || ua.indexOf('FBAN') > -1 || ua.indexOf('FBAV') > -1) {
          document.documentElement.className += ' instagram-browser';
          window.addEventListener('DOMContentLoaded', function() {
            document.body.className += ' is-instagram';
          });
        }
      })();
    </script>
  </head>
  <body>
    <div id="ig-banner">
      <span id="ig-banner-text">For the best experience, tap to open in your browser.</span>
      <div id="ig-banner-actions">
        <button id="ig-open-btn" type="button">Open</button>
        <button id="ig-close-btn" aria-label="Dismiss">&times;</button>
      </div>
      <script>
        (function() {
          var openBtn = document.getElementById('ig-open-btn');
          var closeBtn = document.getElementById('ig-close-btn');
          var ua = navigator.userAgent || '';
          var isAndroid = /Android/i.test(ua);
          var isIOS = /iPhone|iPad|iPod/i.test(ua);
          var url = window.location.href;
          var host = window.location.host;
          var pathAndQuery = window.location.pathname + window.location.search + window.location.hash;

          openBtn.addEventListener('click', function(e) {
            e.preventDefault();
            if (isAndroid) {
              // Android intent — opens default browser, with fallback to Chrome
              var intent = 'intent://' + host + pathAndQuery + '#Intent;scheme=https;package=com.android.chrome;S.browser_fallback_url=' + encodeURIComponent(url) + ';end';
              window.location.href = intent;
              setTimeout(function() {
                window.location.href = url;
              }, 500);
            } else if (isIOS) {
              // iOS Safari deep-link via x-safari-https://
              try {
                window.location.href = 'x-safari-https://' + host + pathAndQuery;
              } catch (err) {}
              // Fallback: copy URL and prompt user
              setTimeout(function() {
                if (navigator.clipboard && navigator.clipboard.writeText) {
                  navigator.clipboard.writeText(url).then(function() {
                    var t = document.getElementById('ig-banner-text');
                    if (t) t.textContent = 'Link copied — paste into Safari';
                  }).catch(function() {});
                }
              }, 800);
            } else {
              window.open(url, '_blank');
            }
          });

          closeBtn.addEventListener('click', function() {
            document.body.classList.remove('is-instagram');
          });
        })();
      </script>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
