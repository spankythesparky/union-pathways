    <style>
      #ig-banner {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        background: linear-gradient(90deg, #FA8059 0%, #F5A878 100%);
        color: #000;
        font-family: Arial, sans-serif;
        padding: 10px 14px;
        z-index: 99999;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        box-shadow: 0 2px 12px rgba(0,0,0,0.3);
        font-size: 13px;
        font-weight: 600;
      }
      body.is-instagram #ig-banner { display: flex; }
      body.is-instagram { padding-top: 44px; }
      #ig-banner-text { flex: 1; line-height: 1.3; }
      #ig-banner-actions { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
      #ig-open-btn {
        display: inline-block;
        background: #000;
        color: #FA8059;
        font-weight: 800;
        font-size: 12px;
        padding: 7px 14px;
        border-radius: 50px;
        text-decoration: none;
        white-space: nowrap;
      }
      #ig-close-btn {
        background: transparent;
        border: 1px solid rgba(0,0,0,0.4);
        color: #000;
        width: 24px;
        height: 24px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        font-size: 14px;
        font-weight: 900;
        line-height: 1;
        padding: 0;
      }
    </style>
    <script>
      (function() {
        var ua = navigator.userAgent || '';
        if (ua.indexOf('Instagram') > -1 || ua.indexOf('FBAN') > -1 || ua.indexOf('FBAV') > -1) {
          document.documentElement.className += ' instagram-browser';
          window.addEventListener('DOMContentLoaded', function() {
            document.body.className += ' is-instagram';
          });
        }
      })();
    </script>
  </head>
  <body>
    <div id="ig-banner">
      <span id="ig-banner-text">For the best experience, open in your browser.</span>
      <div id="ig-banner-actions">
        <a id="ig-open-btn" href="https://unionpathways.com">Open</a>
        <button id="ig-close-btn" aria-label="Dismiss">&times;</button>
      </div>
      <script>
        document.getElementById('ig-open-btn').href = window.location.href;
        document.getElementById('ig-close-btn').addEventListener('click', function() {
          document.body.classList.remove('is-instagram');
        });
      </script>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
