    .filter-btn:not(.active) .filter-dot { opacity:0.25; }
    .filter-count { font-size:9px; opacity:0.5; }
    #map { flex:1; width:100%; }
    .leaflet-popup-content-wrapper {
      background:#0a1628; border:1px solid rgba(58,80,104,0.7);

    .leaflet-popup-content { margin:0; }
    .popup-inner { padding:14px 16px; min-width:200px; }
    .popup-trade { font-family:'Barlow Condensed',sans-serif; font-size:10px; font-weight:700; letter-spacing:0.12em; text-transform:uppercase; margin-bottom:5px; }
    .popup-name { font-family:'Barlow Condensed',sans-serif; font-size:19px; font-weight:900; color:#fff; line-height:1.1; margin-bottom:6px; }
    .popup-location { font-size:12px; color:rgba(160,180,196,0.6); margin-bottom:10px; }
    .popup-links { display:flex; gap:6px; flex-wrap:wrap; }
    .popup-link { font-size:11px; font-weight:600; padding:4px 10px; border-radius:6px; text-decoration:none; background:rgba(250,128,89,0.1); border:1px solid rgba(250,128,89,0.25); color:#FA8059; }
    .popup-link.phone { background:rgba(34,48,61,0.6); border-color:rgba(58,80,104,0.4); color:rgba(160,180,196,0.7); }
    .legend {

      background:rgba(0,0,0,0.88); border:1px solid rgba(58,80,104,0.4);

    }
    .legend-title { font-size:10px; font-weight:700; letter-spacing:0.12em; text-transform:uppercase; color:rgba(160,180,196,0.5); margin-bottom:10px; }
    .legend-item { display:flex; align-items:center; gap:8px; margin-bottom:6px; font-size:13px; font-weight:700; color:#fff; }
    .legend-dot { width:10px; height:10px; border-radius:50%; flex-shrink:0; }
    .legend-count { margin-left:auto; font-size:11px; color:rgba(160,180,196,0.5); }
    .hint { position:absolute; bottom:30px; left:10px; z-index:1000; background:rgba(0,0,0,0.7); border:1px solid rgba(58,80,104,0.3); border-radius:8px; padding:8px 12px; font-size:11px; color:rgba(160,180,196,0.6); font-family:'Barlow Condensed',sans-serif; letter-spacing:0.05em; }

const map = L.map('map', {
  center: [42, -95], zoom: 4, minZoom: 3, maxZoom: 18, zoomControl: true,
});

L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
  attribution: '&copy; OpenStreetMap &copy; CARTO', subdomains: 'abcd', maxZoom: 19
}).addTo(map);

const activeTrades = new Set(TRADES.map(t => t.key));
const layerGroups = {};
const tradeCounts = {};

function createIcon(color) {
  return L.divIcon({
    html: `<div style="width:11px;height:11px;border-radius:50%;background:${color};border:2px solid rgba(255,255,255,0.95);box-shadow:0 0 8px ${color}aa,0 2px 5px rgba(0,0,0,0.7);"></div>`,
    className:'', iconSize:[11,11], iconAnchor:[5.5,5.5], popupAnchor:[0,-7],
  });
}

TRADES.forEach((trade, ti) => {
  tradeCounts[trade.key] = trade.locals.length;

  // Each trade gets its own cluster group with spiderfy enabled
  const cluster = L.markerClusterGroup({
    maxClusterRadius: 30,      // Smaller radius = less aggressive clustering
    spiderfyOnMaxZoom: true,
    spiderfyDistanceMultiplier: 2.5,
    showCoverageOnHover: false,
    zoomToBoundsOnClick: true,
    disableClusteringAtZoom: 10, // At zoom 10+, show individual pins
    iconCreateFunction: (c) => {
      const count = c.getChildCount();
      const size = count < 10 ? 30 : count < 50 ? 36 : 42;
      return L.divIcon({
        html: `<div style="width:${size}px;height:${size}px;border-radius:50%;background:${trade.color}15;border:2px solid ${trade.color}99;display:flex;align-items:center;justify-content:center;font-family:'Barlow Condensed',sans-serif;font-size:${count>99?10:12}px;font-weight:900;color:${trade.color};box-shadow:0 0 10px ${trade.color}22;">${count}</div>`,
        className:'', iconSize:[size,size], iconAnchor:[size/2,size/2],
      });
    }
  });

  trade.locals.forEach(local => {
    if (!local.lat || !local.lng) return;
    // Apply small offset per trade to separate overlapping pins
    const lat = local.lat + trade.offset[0];
    const lng = local.lng + trade.offset[1];
    const marker = L.marker([lat, lng], { icon: createIcon(trade.color) });

    const links = [];
    if (local.phone) links.push(`<a href="tel:${local.phone}" class="popup-link phone">${local.phone}</a>`);
    if (local.website) links.push(`<a href="https://${local.website}" target="_blank" class="popup-link">Website →</a>`);

    marker.bindPopup(`
      <div class="popup-inner">
        <div class="popup-trade" style="color:${trade.color}">${trade.label}</div>
        <div class="popup-name">${local.name}</div>
        <div class="popup-location">${local.city}, ${local.state}</div>
        ${links.length ? `<div class="popup-links">${links.join('')}</div>` : ''}
      </div>
    `, { maxWidth:280 });

    cluster.addLayer(marker);
  });

  layerGroups[trade.key] = cluster;
  map.addLayer(cluster);
});

// Filter buttons
const filtersEl = document.getElementById('filters');
TRADES.forEach(trade => {
  const btn = document.createElement('button');
  btn.className = 'filter-btn active';
  btn.innerHTML = `<span class="filter-dot" style="background:${trade.color}"></span>${trade.label}<span class="filter-count">(${trade.locals.length})</span>`;
  btn.addEventListener('click', () => {
    if (activeTrades.has(trade.key)) {
      activeTrades.delete(trade.key);
      map.removeLayer(layerGroups[trade.key]);
      btn.classList.remove('active');
    } else {
      activeTrades.add(trade.key);
      map.addLayer(layerGroups[trade.key]);
      btn.classList.add('active');
    }
    let vis = 0;
    activeTrades.forEach(k => { vis += tradeCounts[k]||0; });
    document.getElementById('visible-count').textContent = vis;
  });
  filtersEl.appendChild(btn);
});

// Legend removed

// Hint
const hint = document.createElement('div');
hint.className = 'hint';
hint.textContent = 'Click any cluster to zoom in. Zoom to level 10 to see individual pins.';
document.getElementById('map').appendChild(hint);
</script>
